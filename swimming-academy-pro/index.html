const {useState,useEffect,useCallback,useMemo,useRef}=React;

// ═══════════════════════════════════════════
// SUPABASE CONFIG — ضع بيانات مشروعك هنا
// ═══════════════════════════════════════════
const SUPABASE_URL="https://fzqxtyowpqnxkwzeeahv.supabase.co";
const SUPABASE_ANON_KEY="sb_publishable_cU69Lgy9TS_7Cou03dMV7A_8HKgPWHz";
const supabase=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
const AUTH_STORE_KEY="swim_academy_auth";

// ═══════════════════════════════════════════
// LICENSE GATE — Auth Guard Component
// ═══════════════════════════════════════════
const LicenseGate=({children})=>{
  const [authState,setAuthState]=useState("loading"); // loading | login | activated
  const [email,setEmail]=useState("");
  const [licenseKey,setLicenseKey]=useState("");
  const [error,setError]=useState("");
  const [loading,setLoading]=useState(false);
  const [userEmail,setUserEmail]=useState("");
  const [licenseInfo,setLicenseInfo]=useState(null);

  // ── Check saved auth on mount ──
  useEffect(()=>{
    const checkAuth=async()=>{
      try{
        const saved=localStorage.getItem(AUTH_STORE_KEY);
        if(!saved){setAuthState("login");return}
        const{email:savedEmail}=JSON.parse(saved);
        if(!savedEmail){setAuthState("login");return}

        // Verify against Supabase
        const{data,error:err}=await supabase
          .from("licenses")
          .select("*")
          .eq("email",savedEmail)
          .eq("status","activated")
          .single();

        if(err||!data){
          localStorage.removeItem(AUTH_STORE_KEY);
          setAuthState("login");
          return;
        }

        // Check expiry
        if(new Date(data.expiry_date)<new Date()){
          localStorage.removeItem(AUTH_STORE_KEY);
          setError("انتهت صلاحية الترخيص. يرجى التواصل مع الإدارة للتجديد.");
          setAuthState("login");
          return;
        }

        setUserEmail(savedEmail);
        setLicenseInfo(data);
        setAuthState("activated");
      }catch(e){
        console.error("Auth check failed:",e);
        // If Supabase is not configured yet, allow offline access with saved auth
        const saved=localStorage.getItem(AUTH_STORE_KEY);
        if(saved){
          try{
            const{email:savedEmail}=JSON.parse(saved);
            if(savedEmail){setUserEmail(savedEmail);setAuthState("activated");return}
          }catch(e2){}
        }
        setAuthState("login");
      }
    };
    checkAuth();
  },[]);

  // ── Activate License ──
  const handleActivate=async()=>{
    setError("");
    if(!email.trim()||!licenseKey.trim()){setError("يرجى إدخال البريد الإلكتروني وكود التفعيل");return}

    setLoading(true);
    try{
      // Find license by key
      const{data:license,error:findErr}=await supabase
        .from("licenses")
        .select("*")
        .eq("license_key",licenseKey.trim())
        .single();

      if(findErr||!license){
        setError("كود التفعيل غير صحيح. تأكد من الكود وحاول مرة أخرى.");
        setLoading(false);return;
      }

      // Check if already activated by different email
      if(license.status==="activated"&&license.email&&license.email!==email.trim()){
        setError("هذا الكود مُفعّل مسبقاً على بريد إلكتروني آخر.");
        setLoading(false);return;
      }

      // Check expiry
      if(new Date(license.expiry_date)<new Date()){
        setError("كود التفعيل منتهي الصلاحية. يرجى التواصل مع الإدارة.");
        setLoading(false);return;
      }

      // If already activated with same email, just log in
      if(license.status==="activated"&&license.email===email.trim()){
        localStorage.setItem(AUTH_STORE_KEY,JSON.stringify({email:email.trim()}));
        setUserEmail(email.trim());
        setLicenseInfo(license);
        setAuthState("activated");
        setLoading(false);return;
      }

      // Activate: update status and bind email
      const{error:updateErr}=await supabase
        .from("licenses")
        .update({status:"activated",email:email.trim()})
        .eq("license_key",licenseKey.trim());

      if(updateErr){
        setError("حدث خطأ أثناء التفعيل. حاول مرة أخرى.");
        setLoading(false);return;
      }

      // Save to localStorage
      localStorage.setItem(AUTH_STORE_KEY,JSON.stringify({email:email.trim()}));
      setUserEmail(email.trim());
      setLicenseInfo({...license,status:"activated",email:email.trim()});
      setAuthState("activated");
    }catch(e){
      console.error("Activation error:",e);
      setError("خطأ في الاتصال. تأكد من اتصال الإنترنت وإعدادات Supabase.");
    }
    setLoading(false);
  };

  // ── Logout ──
  const handleLogout=()=>{
    localStorage.removeItem(AUTH_STORE_KEY);
    setAuthState("login");
    setUserEmail("");
    setLicenseInfo(null);
    setEmail("");
    setLicenseKey("");
    setError("");
  };

  // ── Loading Screen ──
  if(authState==="loading"){
    return(
      <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#060b18",flexDirection:"column",gap:16}}>
        <div style={{width:50,height:50,borderRadius:14,background:"linear-gradient(135deg,#0ea5e9,#0284c7)",display:"flex",alignItems:"center",justifyContent:"center",animation:"float 2s ease-in-out infinite"}}>
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 20c1.5-1 3-2 5-2s3.5 1 5 2 3 2 5 2 3.5-1 5-2M2 16c1.5-1 3-2 5-2s3.5 1 5 2 3 2 5 2 3.5-1 5-2M12 3a4 4 0 014 4c0 2-2 4-4 6-2-2-4-4-4-6a4 4 0 014-4z"/></svg>
        </div>
        <div style={{color:"#94a3b8",fontSize:14}}>جارٍ التحقق من الترخيص...</div>
      </div>
    );
  }

  // ── Login/Activation Screen ──
  if(authState==="login"){
    return(
      <div dir="rtl" style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#060b18",fontFamily:"'Segoe UI',Tahoma,sans-serif",padding:20,position:"relative",overflow:"hidden"}}>
        {/* Background decorations */}
        <div style={{position:"absolute",top:"10%",right:"5%",width:300,height:300,borderRadius:"50%",background:"radial-gradient(circle,rgba(14,165,233,0.06) 0%,transparent 70%)"}}/>
        <div style={{position:"absolute",bottom:"10%",left:"5%",width:250,height:250,borderRadius:"50%",background:"radial-gradient(circle,rgba(16,185,129,0.05) 0%,transparent 70%)"}}/>

        <div style={{background:"#0c1529",borderRadius:24,padding:"40px 36px",width:"100%",maxWidth:440,border:"1px solid #152040",boxShadow:"0 30px 80px rgba(0,0,0,.5)",position:"relative",animation:"fadeIn .4s ease"}}>
          {/* Logo */}
          <div style={{textAlign:"center",marginBottom:32}}>
            <div style={{width:64,height:64,borderRadius:18,background:"linear-gradient(135deg,#0ea5e9,#0284c7)",display:"inline-flex",alignItems:"center",justifyContent:"center",marginBottom:16,boxShadow:"0 8px 30px rgba(14,165,233,0.3)"}}>
              <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 20c1.5-1 3-2 5-2s3.5 1 5 2 3 2 5 2 3.5-1 5-2M2 16c1.5-1 3-2 5-2s3.5 1 5 2 3 2 5 2 3.5-1 5-2M12 3a4 4 0 014 4c0 2-2 4-4 6-2-2-4-4-4-6a4 4 0 014-4z"/></svg>
            </div>
            <h1 style={{color:"#f1f5f9",fontSize:22,fontWeight:800,margin:"0 0 6px"}}>Swimming Academy Pro</h1>
            <p style={{color:"#4a5e7a",fontSize:13,margin:0}}>أدخل بيانات التفعيل للوصول إلى النظام</p>
          </div>

          {/* Form */}
          <div style={{display:"flex",flexDirection:"column",gap:16}}>
            <div style={{display:"flex",flexDirection:"column",gap:5}}>
              <label style={{fontSize:12,color:"#94a3b8",fontWeight:700}}>البريد الإلكتروني</label>
              <div style={{position:"relative"}}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#4a5e7a" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{position:"absolute",right:12,top:12}}><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><path d="M22 6l-10 7L2 6"/></svg>
                <input value={email} onChange={e=>setEmail(e.target.value)} placeholder="example@email.com" dir="ltr" style={{width:"100%",padding:"12px 40px 12px 14px",borderRadius:12,border:"1px solid #152040",background:"#091020",color:"#f1f5f9",fontSize:14,fontFamily:"inherit",outline:"none",boxSizing:"border-box",textAlign:"left",transition:"border .2s"}} onFocus={e=>e.target.style.borderColor="#0ea5e9"} onBlur={e=>e.target.style.borderColor="#152040"}/>
              </div>
            </div>

            <div style={{display:"flex",flexDirection:"column",gap:5}}>
              <label style={{fontSize:12,color:"#94a3b8",fontWeight:700}}>كود التفعيل</label>
              <div style={{position:"relative"}}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#4a5e7a" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{position:"absolute",right:12,top:12}}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                <input value={licenseKey} onChange={e=>setLicenseKey(e.target.value)} placeholder="XXXX-XXXX-XXXX-XXXX" dir="ltr" style={{width:"100%",padding:"12px 40px 12px 14px",borderRadius:12,border:"1px solid #152040",background:"#091020",color:"#f1f5f9",fontSize:14,fontFamily:"'Courier New',monospace",outline:"none",boxSizing:"border-box",textAlign:"left",letterSpacing:1.5,transition:"border .2s"}} onFocus={e=>e.target.style.borderColor="#0ea5e9"} onBlur={e=>e.target.style.borderColor="#152040"} onKeyDown={e=>{if(e.key==="Enter")handleActivate()}}/>
              </div>
            </div>

            {error&&(
              <div style={{background:"#ef444415",border:"1px solid #ef444433",borderRadius:10,padding:"10px 14px",display:"flex",alignItems:"center",gap:8}}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ef4444" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M15 9l-6 6M9 9l6 6"/></svg>
                <span style={{color:"#ef4444",fontSize:13,flex:1}}>{error}</span>
              </div>
            )}

            <button onClick={handleActivate} disabled={loading} style={{padding:"14px",borderRadius:12,border:"none",background:loading?"#0ea5e966":"linear-gradient(135deg,#0ea5e9,#0284c7)",color:"#fff",fontWeight:700,fontSize:15,cursor:loading?"wait":"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginTop:4,boxShadow:"0 4px 20px rgba(14,165,233,0.3)",transition:"all .2s"}}>
              {loading?(
                <span style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{width:18,height:18,border:"2px solid #ffffff44",borderTopColor:"#fff",borderRadius:"50%",display:"inline-block",animation:"pulse 1s infinite"}}/>
                  جارٍ التحقق...
                </span>
              ):(
                <span style={{display:"flex",alignItems:"center",gap:8}}>
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                  تفعيل الترخيص
                </span>
              )}
            </button>
          </div>

          {/* Footer */}
          <div style={{textAlign:"center",marginTop:24,paddingTop:18,borderTop:"1px solid #152040"}}>
            <p style={{color:"#4a5e7a",fontSize:11,margin:0}}>للحصول على كود التفعيل، تواصل مع إدارة الأكاديمية</p>
          </div>
        </div>
      </div>
    );
  }

  // ── Activated: Render App ──
  return React.Children.map(children,child=>
    React.cloneElement(child,{onLogout:handleLogout,userEmail,licenseInfo})
  );
};

  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{flexShrink:0,...s}}><path d={d}/></svg>

const Badge=({children,color=P.accent})=>(
  <span style={{background:color+"1a",color,padding:"3px 10px",borderRadius:20,fontSize:11,fontWeight:700,whiteSpace:"nowrap",border:`1px solid ${color}33`}}>{children}</span>

const Btn=({children,onClick,color=P.accent,variant="filled",small,disabled,style:s,...rest})=>{
  const bg=variant==="filled"?color:"transparent";
  const bd=variant==="outlined"?`1.5px solid ${color}`:"none";

  return <button style={{padding:small?"6px 12px":"10px 20px",borderRadius:10,border:bd,background:bg,color:tc,fontWeight:600,fontSize:small?12:14,cursor:disabled?"not-allowed":"pointer",opacity:disabled?.5:1,transition:"all .15s",fontFamily:"inherit",display:"inline-flex",alignItems:"center",gap:5,whiteSpace:"nowrap",...s}} onClick={disabled?undefined:onClick} {...rest}>{children}</button>;
};

const Inp=({label,value,onChange,type="text",options,placeholder,textarea,style:s,children,...rest})=>(
  <div style={{display:"flex",flexDirection:"column",gap:4,...s}}>
    {label&&<label style={{fontSize:11,color:P.dim,fontWeight:700,letterSpacing:.3}}>{label}</label>}
    {options?(
      <select value={value} onChange={e=>onChange(e.target.value)} style={{padding:"9px 12px",borderRadius:8,border:`1px solid ${P.border}`,background:P.surface,color:P.text,fontSize:13,fontFamily:"inherit",outline:"none"}} {...rest}>

    ):textarea?(
      <textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={3} style={{padding:"9px 12px",borderRadius:8,border:`1px solid ${P.border}`,background:P.surface,color:P.text,fontSize:13,fontFamily:"inherit",outline:"none",resize:"vertical"}} {...rest}/>

const waLink=(phone,msg)=>{
  const clean=phone.replace(/^0/,"966");
  return`https://wa.me/${clean}?text=${encodeURIComponent(msg)}`;
};

const WaBtn=({phone,msg,label,small=true})=>(

// ── Photo handler (stateless, outside App) ──
const handlePhoto=(file,cb)=>{
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>cb(e.target.result);
  reader.readAsDataURL(file);
};

// ── Player Form (defined OUTSIDE App to prevent re-creation on every render) ──

    <div style={{display:"flex",flexDirection:"column",gap:16}}>

          {player.photo?<img src={player.photo} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<div style={{textAlign:"center"}}><Icon d={IC.camera} color={P.muted} size={24}/><div style={{fontSize:10,color:P.muted,marginTop:4}}>صورة</div></div>}

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <Inp label="رقم الجوال" value={player.phone} onChange={v=>setPlayer(p=>({...p,phone:v}))} placeholder="05xxxxxxxx"/>
        <Inp label="العمر" type="number" value={player.age} onChange={v=>setPlayer(p=>({...p,age:v}))}/>
        <Inp label="المستوى" value={player.level} onChange={v=>setPlayer(p=>({...p,level:v}))} options={settings.levels}/>
        <Inp label="الكلاس" value={player.classId} onChange={v=>setPlayer(p=>({...p,classId:Number(v),sessionHour:""}))} options={settings.classes.map(c=>({value:c.id,label:c.name}))}/>
        <Inp label="ساعة التمرين" value={player.sessionHour} onChange={v=>setPlayer(p=>({...p,sessionHour:v}))} options={["",  ...classHours].map(h=>({value:h,label:h||"اختر الساعة"}))}/>
        <Inp label="عدد التمارين" type="number" value={player.totalSessions} onChange={v=>setPlayer(p=>({...p,totalSessions:Number(v)}))} placeholder="12"/>
        <Inp label="نوع الاشتراك" value={player.subscription.type} onChange={v=>setPlayer(p=>({...p,subscription:{...p.subscription,type:v}}))} options={settings.subTypes}/>
        <Inp label="مبلغ الاشتراك" type="number" value={player.subscription.amount} onChange={v=>setPlayer(p=>({...p,subscription:{...p.subscription,amount:Number(v)}}))}/>
        <Inp label="تاريخ البدء" type="date" value={player.subscription.startDate} onChange={v=>setPlayer(p=>({...p,subscription:{...p.subscription,startDate:v}}))}/>
        {isEdit&&<Inp label="التمارين المستخدمة" type="number" value={player.usedSessions} onChange={v=>setPlayer(p=>({...p,usedSessions:Number(v)}))}/>}

// MAIN APP
// ═══════════════════════════════════════════
function App({onLogout,userEmail,licenseInfo}){
  const [store,setStore]=useState(load);
  const [tab,setTab]=useState(0);
  const [search,setSearch]=useState("");
  const [filterClass,setFilterClass]=useState("الكل");
  const [filterLevel,setFilterLevel]=useState("الكل");
  const [selPlayer,setSelPlayer]=useState(null);
  const [showAddPlayer,setShowAddPlayer]=useState(false);
  const [editPlayer,setEditPlayer]=useState(null);
  const [showAddFee,setShowAddFee]=useState(null);
  const [newFee,setNewFee]=useState({desc:"",amount:"",paid:false,date:today()});
  const [attDate,setAttDate]=useState(today());
  const [toast,setToast]=useState(null);

  const settings=store.settings;
  const players=store.players;

  useEffect(()=>{save(store)},[store]);

  const tt=useCallback((msg,type="success")=>{setToast({msg,type});setTimeout(()=>setToast(null),3000)},[]);

  const updateSettings=useCallback(u=>{setStore(s=>({...s,settings:{...s.settings,...u}}))},[]);
  const updatePlayer=useCallback((id,u)=>{setStore(s=>({...s,players:s.players.map(p=>p.id===id?{...p,...u}:p)}))},[]);
  const deletePlayer=useCallback(id=>{setStore(s=>({...s,players:s.players.filter(p=>p.id!==id)}));setSelPlayer(null);tt("تم حذف اللاعب")},[tt]);

  const activePlayers=useMemo(()=>players.filter(p=>p.active),[players]);
  const getClassName=useCallback(cid=>{const c=settings.classes.find(x=>x.id===cid);return c?c.name:"—"},[settings.classes]);
  const getClassHours=useCallback(cid=>{const c=settings.classes.find(x=>x.id===cid);return c?c.hours:[]},[settings.classes]);

  const filtered=useMemo(()=>players.filter(p=>{
    if(search&&!p.name.includes(search)&&!p.phone.includes(search))return false;
    if(filterClass!=="الكل"&&p.classId!==Number(filterClass))return false;
    if(filterLevel!=="الكل"&&p.level!==filterLevel)return false;
    return true;
  }),[players,search,filterClass,filterLevel]);

  const stats=useMemo(()=>{
    const expSoon=activePlayers.filter(p=>{const d=daysLeft(p.subscription.endDate);return d>=0&&d<=7});
    const expired=activePlayers.filter(p=>daysLeft(p.subscription.endDate)<0);
    const totalRev=players.reduce((s,p)=>s+(p.subscription.paid?p.subscription.amount:0)+p.fees.filter(f=>f.paid).reduce((a,f)=>a+f.amount,0),0);
    const pendRev=players.reduce((s,p)=>s+(!p.subscription.paid?p.subscription.amount:0)+p.fees.filter(f=>!f.paid).reduce((a,f)=>a+f.amount,0),0);
    const classDist=settings.classes.map(c=>({name:c.name,id:c.id,count:activePlayers.filter(p=>p.classId===c.id).length}));
    const lowSessions=activePlayers.filter(p=>p.totalSessions-p.usedSessions<=2&&p.totalSessions-p.usedSessions>=0);
    return{expSoon,expired,totalRev,pendRev,classDist,lowSessions};
  },[players,activePlayers,settings.classes]);

  // ── Add Player ──
  const emptyPlayer={name:"",phone:"",age:"",level:settings.levels[0],classId:settings.classes[0]?.id||1,sessionHour:"",photo:null,active:true,notes:"",totalSessions:12,usedSessions:0,subscription:{type:settings.subTypes[1]||"شهري",startDate:today(),endDate:"",amount:300,paid:false},fees:[],attendance:[]};
  const [np,setNp]=useState({...emptyPlayer});

  const doAddPlayer=()=>{
    if(!np.name.trim()){tt("يرجى إدخال اسم اللاعب","danger");return}
    const end=new Date(np.subscription.startDate);
    const m={"يومي":0,"شهري":1,"ربع سنوي":3,"نصف سنوي":6,"سنوي":12};
    const addMonths=m[np.subscription.type];
    if(addMonths===0){end.setDate(end.getDate()+1)}else{end.setMonth(end.getMonth()+(addMonths||1))}
    const player={...np,id:Date.now(),subscription:{...np.subscription,endDate:end.toISOString().split("T")[0]}};
    setStore(s=>({...s,players:[...s.players,player]}));
    setNp({...emptyPlayer});
    setShowAddPlayer(false);
    tt("تمت إضافة اللاعب بنجاح ✓");
  };

  // ── Edit Player ──
  const [ep,setEp]=useState(null);
  const openEdit=(p)=>{setEp({...p,subscription:{...p.subscription}});setEditPlayer(p.id)};
  const doEditPlayer=()=>{
    if(!ep.name.trim()){tt("يرجى إدخال اسم اللاعب","danger");return}
    const end=new Date(ep.subscription.startDate);
    const m={"يومي":0,"شهري":1,"ربع سنوي":3,"نصف سنوي":6,"سنوي":12};
    const addMonths=m[ep.subscription.type];
    if(addMonths===0){end.setDate(end.getDate()+1)}else{end.setMonth(end.getMonth()+(addMonths||1))}
    updatePlayer(ep.id,{...ep,subscription:{...ep.subscription,endDate:end.toISOString().split("T")[0]}});
    setEditPlayer(null);setEp(null);
    tt("تم تحديث بيانات اللاعب ✓");
  };

  // ── Subscription ──
  const renewSub=(pid)=>{
    const p=players.find(x=>x.id===pid);if(!p)return;
    const start=today();const end=new Date(start);
    const m={"يومي":0,"شهري":1,"ربع سنوي":3,"نصف سنوي":6,"سنوي":12};
    const addM=m[p.subscription.type];
    if(addM===0){end.setDate(end.getDate()+1)}else{end.setMonth(end.getMonth()+(addM||1))}
    updatePlayer(pid,{subscription:{...p.subscription,startDate:start,endDate:end.toISOString().split("T")[0],paid:false},usedSessions:0});
    tt("تم تجديد الاشتراك ✓");
  };

  // ── Fees ──
  const addFeeToPlayer=(pid)=>{
    if(!newFee.desc||!newFee.amount){tt("أكمل بيانات الرسم","danger");return}
    const p=players.find(x=>x.id===pid);
    updatePlayer(pid,{fees:[...p.fees,{...newFee,id:Date.now(),amount:Number(newFee.amount)}]});
    setNewFee({desc:"",amount:"",paid:false,date:today()});setShowAddFee(null);
    tt("تمت إضافة الرسم ✓");
  };

  // ── Attendance ──
  const toggleAtt=(pid,date,status)=>{
    const p=players.find(x=>x.id===pid);
    const att=[...p.attendance];const idx=att.findIndex(a=>a.date===date);
    if(idx>=0)att[idx]={date,status};else att.push({date,status});
    // auto-increment usedSessions on marking present
    let extra={};
    if(status==="حاضر"||status==="متأخر"){
      const prev=p.attendance.find(a=>a.date===date);
      if(!prev||prev.status==="غائب"||prev.status==="إجازة"){extra.usedSessions=Math.min(p.usedSessions+1,p.totalSessions)}
    }
    updatePlayer(pid,{attendance:att,...extra});
  };
  const getAtt=(pid,date)=>{const p=players.find(x=>x.id===pid);return p?.attendance?.find(x=>x.date===date)?.status||""};
  const attC={"حاضر":P.success,"غائب":P.danger,"متأخر":P.warn,"إجازة":P.muted};

  const getWeek=(cd)=>{const d=new Date(cd);const day=d.getDay();const s=new Date(d);s.setDate(d.getDate()-day);return Array.from({length:7},(_,i)=>{const dd=new Date(s);dd.setDate(s.getDate()+i);return dd.toISOString().split("T")[0]})};
  const weekDates=useMemo(()=>getWeek(attDate),[attDate]);
  const dayN=["أحد","إثنين","ثلاثاء","أربعاء","خميس","جمعة","سبت"];

  const pAttStats=useCallback(p=>{
    const t=p.attendance.length;if(!t)return{rate:0,present:0,absent:0,late:0};
    const pr=p.attendance.filter(a=>a.status==="حاضر").length;
    const lt=p.attendance.filter(a=>a.status==="متأخر").length;
    const ab=p.attendance.filter(a=>a.status==="غائب").length;
    return{rate:Math.round(((pr+lt)/t)*100),present:pr,absent:ab,late:lt};
  },[]);

  // ── WhatsApp Templates ──
  const waStart=(p)=>`السلام عليكم ${p.name}،\nأهلاً بك في ${settings.facilityName} 🏊\n\nتفاصيل اشتراكك:\n📅 تاريخ البدء: ${p.subscription.startDate}\n🔢 عدد التمارين: ${p.totalSessions}\n🕐 الكلاس: ${getClassName(p.classId)} - ${p.sessionHour}\n💰 المبلغ: ${p.subscription.amount} ر.س\n\nنتمنى لك تجربة ممتعة!`;
  const waEnd=(p)=>{const d=daysLeft(p.subscription.endDate);return`السلام عليكم ${p.name}،\nنود إبلاغك بأن اشتراكك في ${settings.facilityName} ${d<0?"قد انتهى":"ينتهي قريباً"} 🏊\n\n📅 تاريخ الانتهاء: ${p.subscription.endDate}\n${d<0?`⚠️ منتهي منذ ${Math.abs(d)} يوم`:`⏳ متبقي ${d} يوم`}\n\nيرجى التواصل معنا لتجديد الاشتراك.\nشكراً لك!`};
  const waSessions=(p)=>{const rem=p.totalSessions-p.usedSessions;return`السلام عليكم ${p.name}،\nتحديث تمارينك في ${settings.facilityName} 🏊\n\n✅ التمارين المستخدمة: ${p.usedSessions}/${p.totalSessions}\n${rem<=2?"⚠️":"📊"} المتبقي: ${rem} تمرين\n${rem<=0?"\n❗ لقد استنفذت جميع تمارينك. يرجى تجديد الاشتراك.":rem<=2?"\n⚠️ تمارينك على وشك الانتهاء!":""}\n\nشكراً لك!`};

  // ═══════════════════ TABS RENDER ═══════════════════

  // ── Dashboard ──
  const renderDash=()=>(
    <div style={{display:"flex",flexDirection:"column",gap:22}}>
      <div style={{display:"flex",flexWrap:"wrap",gap:14}}>
        <StatCard icon={IC.users} label="اللاعبون النشطون" value={activePlayers.length} sub={`من أصل ${players.length}`}/>
        <StatCard icon={IC.dollar} label="الإيرادات المحصلة" value={`${stats.totalRev.toLocaleString()}`} sub="ر.س" color={P.success}/>
        <StatCard icon={IC.bell} label="مستحقات معلقة" value={`${stats.pendRev.toLocaleString()}`} sub="ر.س" color={P.warn}/>
        <StatCard icon={IC.cal} label="تنتهي خلال أسبوع" value={stats.expSoon.length} sub={stats.expired.length?`${stats.expired.length} منتهية`:""} color={P.danger}/>
      </div>
      <div style={{display:"flex",flexWrap:"wrap",gap:14}}>
        <div style={{background:P.card,borderRadius:16,padding:20,border:`1px solid ${P.border}`,flex:"1 1 280px"}}>
          <h4 style={{color:P.text,margin:"0 0 14px",fontSize:15,fontWeight:700}}>توزيع الكلاسات</h4>
          {stats.classDist.map((g,i)=>(

  const renderFees=()=>(
    <div>
      <div style={{display:"flex",flexWrap:"wrap",gap:14,marginBottom:18}}>
        <StatCard icon={IC.dollar} label="مدفوع" value={`${players.flatMap(p=>p.fees).filter(f=>f.paid).reduce((s,f)=>s+f.amount,0)} ر.س`} color={P.success}/>
        <StatCard icon={IC.bell} label="معلق" value={`${players.flatMap(p=>p.fees).filter(f=>!f.paid).reduce((s,f)=>s+f.amount,0)} ر.س`} color={P.danger}/>
      </div>
      <div style={{background:P.card,borderRadius:14,border:`1px solid ${P.border}`,overflow:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead><tr style={{background:P.surface}}>
            {["اللاعب","الوصف","المبلغ","التاريخ","الحالة","إجراء"].map(h=>(
              <th key={h} style={{padding:"12px 10px",textAlign:"right",color:P.dim,fontSize:12,fontWeight:600,borderBottom:`1px solid ${P.border}`}}>{h}</th>
            ))}
          </tr></thead>
          <tbody>
            {players.flatMap(p=>p.fees.map((f,i)=>({...f,pName:p.name,pId:p.id,fi:i,ph:p.phone}))).map((f,idx)=>(
              <tr key={idx} style={{borderBottom:`1px solid ${P.border}`}}>
                <td style={{padding:10,fontSize:13,fontWeight:600,color:P.text}}>{f.pName}</td>
                <td style={{padding:10,fontSize:12,color:P.dim}}>{f.desc}</td>
                <td style={{padding:10,fontSize:13,fontWeight:600,color:P.text}}>{f.amount} ر.س</td>
                <td style={{padding:10,fontSize:12,color:P.dim}}>{f.date}</td>
                <td style={{padding:10}}><Badge color={f.paid?P.success:P.danger}>{f.paid?"مدفوع":"معلق"}</Badge></td>
                <td style={{padding:10}}>
                  <button onClick={()=>{const p=players.find(x=>x.id===f.pId);const fees=[...p.fees];fees[f.fi]={...fees[f.fi],paid:!fees[f.fi].paid};updatePlayer(f.pId,{fees})}} style={{background:"none",border:`1px solid ${f.paid?P.success:P.warn}`,borderRadius:6,padding:"3px 8px",color:f.paid?P.success:P.warn,fontSize:10,cursor:"pointer",fontFamily:"inherit"}}>{f.paid?"إلغاء":"تأكيد"}</button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );

  // ── Reports Tab ──
  const renderReports=()=>{
    const tSub=players.reduce((s,p)=>s+(p.subscription.paid?p.subscription.amount:0),0);
    const tFee=players.flatMap(p=>p.fees).filter(f=>f.paid).reduce((s,f)=>s+f.amount,0);
    const pSub=players.reduce((s,p)=>s+(!p.subscription.paid?p.subscription.amount:0),0);
    const pFee=players.flatMap(p=>p.fees).filter(f=>!f.paid).reduce((s,f)=>s+f.amount,0);
    const tc=tSub+tFee;const tp=pSub+pFee;
    const avgA=activePlayers.length?Math.round(activePlayers.reduce((s,p)=>s+pAttStats(p).rate,0)/activePlayers.length):0;
    const best=activePlayers.length?activePlayers.reduce((b,p)=>pAttStats(p).rate>pAttStats(b).rate?p:b,activePlayers[0]):null;
    return(
      <div style={{display:"flex",flexDirection:"column",gap:18}}>
        <div style={{display:"flex",flexWrap:"wrap",gap:14}}>
          <StatCard icon={IC.dollar} label="إجمالي المحصل" value={`${tc.toLocaleString()}`} sub="ر.س" color={P.success}/>
          <StatCard icon={IC.bell} label="إجمالي المعلق" value={`${tp.toLocaleString()}`} sub="ر.س" color={P.danger}/>
          <StatCard icon={IC.card} label="اشتراكات" value={`${tSub.toLocaleString()}`} sub="ر.س" color={P.accent}/>
          <StatCard icon={IC.dollar} label="رسوم" value={`${tFee.toLocaleString()}`} sub="ر.س" color={P.warn}/>
        </div>
        <div style={{display:"flex",flexWrap:"wrap",gap:14}}>
          <div style={{background:P.card,borderRadius:16,padding:20,border:`1px solid ${P.border}`,flex:"1 1 320px"}}>
            <h4 style={{color:P.text,margin:"0 0 14px",fontSize:15,fontWeight:700}}>إيراد كل لاعب</h4>
            {players.map(p=>{
              const r=(p.subscription.paid?p.subscription.amount:0)+p.fees.filter(f=>f.paid).reduce((s,f)=>s+f.amount,0);
              const pd=(!p.subscription.paid?p.subscription.amount:0)+p.fees.filter(f=>!f.paid).reduce((s,f)=>s+f.amount,0);
              return(
                <div key={p.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:7}}>
                  <span style={{fontSize:12,color:P.text,minWidth:80}}>{p.name}</span>
                  <div style={{flex:1,height:20,background:P.surface,borderRadius:5,overflow:"hidden",display:"flex"}}>
                    {r>0&&<div style={{width:`${(r/(r+pd||1))*100}%`,background:P.success,height:"100%"}}/>}
                    {pd>0&&<div style={{width:`${(pd/(r+pd||1))*100}%`,background:P.danger+"55",height:"100%"}}/>}
                  </div>
                  <span style={{fontSize:11,color:P.success,fontWeight:600,minWidth:40}}>{r}</span>
                  {pd>0&&<span style={{fontSize:11,color:P.danger}}>({pd})</span>}
                </div>
              );
            })}
          </div>
          <div style={{background:P.card,borderRadius:16,padding:20,border:`1px solid ${P.border}`,flex:"1 1 260px"}}>
            <h4 style={{color:P.text,margin:"0 0 14px",fontSize:15,fontWeight:700}}>الحضور</h4>
            <div style={{textAlign:"center",marginBottom:16}}>
              <div style={{fontSize:44,fontWeight:800,color:avgA>=80?P.success:avgA>=50?P.warn:P.danger}}>{avgA}%</div>
              <div style={{fontSize:12,color:P.muted}}>متوسط الحضور</div>
            </div>
            {best&&<div style={{background:P.success+"0d",borderRadius:10,padding:10,marginBottom:14,textAlign:"center",border:`1px solid ${P.success}22`}}>
              <div style={{fontSize:11,color:P.success}}>⭐ الأكثر التزاماً</div>
              <div style={{fontSize:14,fontWeight:700,color:P.text,marginTop:3}}>{best.name} — {pAttStats(best).rate}%</div>
            </div>}
            {activePlayers.sort((a,b)=>pAttStats(b).rate-pAttStats(a).rate).map(p=>{
              const st=pAttStats(p);
              return(
                <div key={p.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                  <span style={{fontSize:12,color:P.text,minWidth:70}}>{p.name}</span>
                  <div style={{flex:1,height:16,background:P.surface,borderRadius:5,overflow:"hidden"}}>
                    <div style={{width:`${st.rate}%`,height:"100%",background:st.rate>=80?P.success:st.rate>=50?P.warn:P.danger,borderRadius:5}}/>
                  </div>
                  <span style={{fontSize:11,fontWeight:700,color:st.rate>=80?P.success:st.rate>=50?P.warn:P.danger}}>{st.rate}%</span>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    );
  };

  // ── Settings Tab ──
  const [newClassName,setNewClassName]=useState("");
  const [newClassHours,setNewClassHours]=useState("");
  const [editCls,setEditCls]=useState(null);
  const [editClsName,setEditClsName]=useState("");
  const [editClsHours,setEditClsHours]=useState("");

  const renderSettings=()=>(
    <div style={{display:"flex",flexDirection:"column",gap:20,maxWidth:700}}>
      {/* Facility Name */}
      <div style={{background:P.card,borderRadius:16,padding:20,border:`1px solid ${P.border}`}}>
        <h4 style={{color:P.text,margin:"0 0 14px",fontSize:16,fontWeight:700,display:"flex",alignItems:"center",gap:8}}>
          <Icon d={IC.swim} color={P.accent} size={20}/> إعدادات المنشأة
        </h4>
        <Inp label="اسم المنشأة" value={settings.facilityName} onChange={v=>updateSettings({facilityName:v})} placeholder="اسم الأكاديمية"/>
      </div>

      {/* Classes Management */}
      <div style={{background:P.card,borderRadius:16,padding:20,border:`1px solid ${P.border}`}}>
        <h4 style={{color:P.text,margin:"0 0 14px",fontSize:16,fontWeight:700,display:"flex",alignItems:"center",gap:8}}>
          <Icon d={IC.clock} color={P.accent} size={20}/> إدارة الكلاسات
        </h4>
        {settings.classes.map(c=>(
          <div key={c.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:`1px solid ${P.border}`,flexWrap:"wrap"}}>
            <div style={{flex:1,minWidth:120}}>
              <div style={{color:P.text,fontSize:14,fontWeight:600}}>{c.name}</div>
              <div style={{color:P.dim,fontSize:11,marginTop:2}}>{c.hours.join(" • ")}</div>
            </div>
            <div style={{display:"flex",gap:6}}>
              <button onClick={()=>{setEditCls(c.id);setEditClsName(c.name);setEditClsHours(c.hours.join(","))}} style={{background:P.surface,border:`1px solid ${P.border}`,borderRadius:7,padding:5,cursor:"pointer",display:"flex"}}><Icon d={IC.edit} size={14} color={P.accent}/></button>
              <button onClick={()=>{if(confirm("حذف هذا الكلاس؟"))updateSettings({classes:settings.classes.filter(x=>x.id!==c.id)})}} style={{background:P.surface,border:`1px solid ${P.border}`,borderRadius:7,padding:5,cursor:"pointer",display:"flex"}}><Icon d={IC.trash} size={14} color={P.danger}/></button>
            </div>
          </div>
        ))}

        {/* Edit Class Modal */}
        <Modal open={!!editCls} onClose={()=>setEditCls(null)} title="تعديل الكلاس">
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <Inp label="اسم الكلاس" value={editClsName} onChange={setEditClsName}/>
            <Inp label="الساعات (مفصولة بفاصلة)" value={editClsHours} onChange={setEditClsHours} placeholder="06:00,07:00,08:00"/>
            <Btn onClick={()=>{
              updateSettings({classes:settings.classes.map(c=>c.id===editCls?{...c,name:editClsName,hours:editClsHours.split(",").map(h=>h.trim()).filter(Boolean)}:c)});
              setEditCls(null);tt("تم تحديث الكلاس ✓");
            }}>حفظ</Btn>
          </div>
        </Modal>

        {/* Add New Class */}
        <div style={{marginTop:14,padding:14,background:P.surface,borderRadius:10,border:`1px solid ${P.border}`}}>
          <div style={{fontSize:13,color:P.dim,fontWeight:600,marginBottom:8}}>إضافة كلاس جديد</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            <Inp value={newClassName} onChange={setNewClassName} placeholder="اسم الكلاس" style={{flex:"1 1 120px"}}/>
            <Inp value={newClassHours} onChange={setNewClassHours} placeholder="الساعات: 06:00,07:00" style={{flex:"1 1 150px"}}/>
            <Btn small onClick={()=>{
              if(!newClassName.trim()){tt("أدخل اسم الكلاس","danger");return}
              const hrs=newClassHours.split(",").map(h=>h.trim()).filter(Boolean);
              updateSettings({classes:[...settings.classes,{id:Date.now(),name:newClassName,hours:hrs}]});
              setNewClassName("");setNewClassHours("");
              tt("تمت إضافة الكلاس ✓");
            }}><Icon d={IC.plus} size={14} color="#fff"/> إضافة</Btn>
          </div>
        </div>
      </div>

      {/* Subscription Types */}
      <div style={{background:P.card,borderRadius:16,padding:20,border:`1px solid ${P.border}`}}>
        <h4 style={{color:P.text,margin:"0 0 14px",fontSize:16,fontWeight:700,display:"flex",alignItems:"center",gap:8}}>
          <Icon d={IC.card} color={P.accent} size={20}/> أنواع الاشتراكات
        </h4>
        <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
          {settings.subTypes.map(st=>(
            <div key={st} style={{display:"flex",alignItems:"center",gap:6,background:P.surface,borderRadius:8,padding:"6px 12px",border:`1px solid ${P.border}`}}>
              <span style={{color:P.text,fontSize:13}}>{st}</span>
              <button onClick={()=>{if(settings.subTypes.length<=1){tt("يجب وجود نوع واحد على الأقل","danger");return}updateSettings({subTypes:settings.subTypes.filter(x=>x!==st)})}} style={{background:"none",border:"none",cursor:"pointer",display:"flex",padding:2}}><Icon d={IC.x} size={12} color={P.danger}/></button>
            </div>
          ))}
        </div>
        <div style={{marginTop:10,display:"flex",gap:8}}>
          <input id="newSubType" placeholder="نوع جديد..." style={{padding:"7px 10px",borderRadius:8,border:`1px solid ${P.border}`,background:P.surface,color:P.text,fontSize:13,fontFamily:"inherit",outline:"none",flex:1}}/>
          <Btn small onClick={()=>{
            const inp=document.getElementById("newSubType");
            if(!inp.value.trim())return;
            if(settings.subTypes.includes(inp.value.trim())){tt("موجود مسبقاً","danger");return}
            updateSettings({subTypes:[...settings.subTypes,inp.value.trim()]});
            inp.value="";tt("تمت الإضافة ✓");
          }}><Icon d={IC.plus} size={14} color="#fff"/> إضافة</Btn>
        </div>
      </div>

      {/* Levels */}
      <div style={{background:P.card,borderRadius:16,padding:20,border:`1px solid ${P.border}`}}>
        <h4 style={{color:P.text,margin:"0 0 14px",fontSize:16,fontWeight:700}}>المستويات</h4>
        <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
          {settings.levels.map(lv=>(
            <div key={lv} style={{display:"flex",alignItems:"center",gap:6,background:P.surface,borderRadius:8,padding:"6px 12px",border:`1px solid ${P.border}`}}>
              <span style={{color:P.text,fontSize:13}}>{lv}</span>
              <button onClick={()=>{if(settings.levels.length<=1)return;updateSettings({levels:settings.levels.filter(x=>x!==lv)})}} style={{background:"none",border:"none",cursor:"pointer",display:"flex",padding:2}}><Icon d={IC.x} size={12} color={P.danger}/></button>
            </div>
          ))}
        </div>
        <div style={{marginTop:10,display:"flex",gap:8}}>
          <input id="newLevel" placeholder="مستوى جديد..." style={{padding:"7px 10px",borderRadius:8,border:`1px solid ${P.border}`,background:P.surface,color:P.text,fontSize:13,fontFamily:"inherit",outline:"none",flex:1}}/>
          <Btn small onClick={()=>{
            const inp=document.getElementById("newLevel");
            if(!inp.value.trim())return;
            updateSettings({levels:[...settings.levels,inp.value.trim()]});
            inp.value="";tt("تمت الإضافة ✓");
          }}><Icon d={IC.plus} size={14} color="#fff"/> إضافة</Btn>
        </div>
      </div>

      {/* License Info & Logout */}
      <div style={{background:P.card,borderRadius:16,padding:20,border:`1px solid ${P.accent}33`}}>
        <h4 style={{color:P.text,margin:"0 0 14px",fontSize:16,fontWeight:700,display:"flex",alignItems:"center",gap:8}}>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={P.accent} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
          الترخيص والحساب
        </h4>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",background:P.surface,borderRadius:10,border:`1px solid ${P.border}`}}>
            <div>
              <div style={{fontSize:11,color:P.muted}}>البريد الإلكتروني</div>
              <div style={{fontSize:14,color:P.text,fontWeight:600,direction:"ltr",textAlign:"right"}}>{userEmail||"—"}</div>
            </div>
            <Badge color={P.success}>مُفعّل</Badge>
          </div>
          {licenseInfo&&(
            <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
              <div style={{flex:1,padding:"10px 14px",background:P.surface,borderRadius:10,border:`1px solid ${P.border}`}}>
                <div style={{fontSize:11,color:P.muted}}>كود الترخيص</div>
                <div style={{fontSize:13,color:P.dim,fontFamily:"'Courier New',monospace",direction:"ltr",textAlign:"right",marginTop:2}}>{licenseInfo.license_key||"—"}</div>
              </div>
              <div style={{flex:1,padding:"10px 14px",background:P.surface,borderRadius:10,border:`1px solid ${P.border}`}}>
                <div style={{fontSize:11,color:P.muted}}>تاريخ الانتهاء</div>
                <div style={{fontSize:13,color:licenseInfo.expiry_date&&daysLeft(licenseInfo.expiry_date)<=30?P.warn:P.success,fontWeight:600,marginTop:2}}>{licenseInfo.expiry_date||"—"} {licenseInfo.expiry_date?`(${daysLeft(licenseInfo.expiry_date)} يوم)`:""}</div>
              </div>
            </div>
          )}
          {onLogout&&<Btn small color={P.warn} variant="outlined" onClick={()=>{if(confirm("هل تريد تسجيل الخروج؟"))onLogout()}}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
            تسجيل الخروج
          </Btn>}
        </div>
      </div>

      {/* Reset */}
      <div style={{background:P.card,borderRadius:16,padding:20,border:`1px solid ${P.danger}33`}}>
        <h4 style={{color:P.danger,margin:"0 0 10px",fontSize:15,fontWeight:700}}>إعادة ضبط</h4>
        <p style={{color:P.dim,fontSize:12,marginBottom:12}}>سيتم حذف جميع البيانات وإعادة ضبط النظام بالكامل.</p>
        <Btn small color={P.danger} variant="outlined" onClick={()=>{if(confirm("هل أنت متأكد من إعادة الضبط؟ سيتم حذف جميع البيانات!")){localStorage.removeItem(STORE_KEY);setStore({settings:defaultSettings,players:defaultPlayers});tt("تم إعادة الضبط")}}}>إعادة ضبط المصنع</Btn>
      </div>
    </div>
  );

  // ═══════════════════ MAIN RENDER ═══════════════════
  const tabIcons=[IC.home,IC.users,IC.cal,IC.card,IC.dollar,IC.chart,IC.gear];
  const renderTab=()=>{switch(tab){case 0:return renderDash();case 1:return renderPlayers();case 2:return renderAtt();case 3:return renderSubs();case 4:return renderFees();case 5:return renderReports();case 6:return renderSettings();default:return null}};

  return(
    <div dir="rtl" style={{fontFamily:"'Segoe UI',Tahoma,sans-serif",background:P.bg,color:P.text,minHeight:"100vh"}}>
      {toast&&<div style={{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",background:toast.type==="danger"?P.danger:P.success,color:"#fff",padding:"10px 24px",borderRadius:12,fontSize:13,fontWeight:600,zIndex:9999,boxShadow:"0 8px 30px rgba(0,0,0,.4)",animation:"slideDown .3s ease"}}>{toast.msg}</div>}

      {/* Header */}
      <div style={{background:`linear-gradient(135deg,${P.surface},${P.bg})`,borderBottom:`1px solid ${P.border}`,padding:"14px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,zIndex:100,backdropFilter:"blur(12px)"}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:42,height:42,borderRadius:12,background:`linear-gradient(135deg,${P.accent},${P.accentDk})`,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:`0 4px 15px ${P.accent}33`}}>
            <Icon d={IC.swim} color="#fff" size={22}/>
          </div>
          <div>
            <h1 style={{margin:0,fontSize:18,fontWeight:800,color:P.text,lineHeight:1.2}}>{settings.facilityName}</h1>
            <span style={{fontSize:11,color:P.muted}}>Swimming Academy Pro</span>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12,fontSize:12,color:P.dim}}>
          {userEmail&&<span style={{background:P.surface,border:`1px solid ${P.border}`,borderRadius:8,padding:"4px 10px",fontSize:11,color:P.dim,maxWidth:150,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",direction:"ltr"}}>{userEmail}</span>}
          <div style={{display:"flex",alignItems:"center",gap:5}}>
            <span style={{width:7,height:7,borderRadius:"50%",background:P.success,display:"inline-block"}}/>
            {today()}
          </div>
        </div>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",gap:2,padding:"10px 12px",overflowX:"auto",background:P.bg,borderBottom:`1px solid ${P.border}`}}>
        {TABS.map((t,i)=>(
          <button key={t} onClick={()=>setTab(i)} style={{padding:"8px 14px",borderRadius:9,border:"none",background:tab===i?P.accent+"15":"transparent",color:tab===i?P.accent:P.muted,fontWeight:tab===i?700:500,fontSize:12,cursor:"pointer",fontFamily:"inherit",transition:"all .15s",display:"flex",alignItems:"center",gap:5,whiteSpace:"nowrap",borderBottom:tab===i?`2px solid ${P.accent}`:"2px solid transparent"}}>
            <Icon d={tabIcons[i]} size={15} color={tab===i?P.accent:P.muted}/>
            {t}
          </button>
        ))}
      </div>

      {/* Content */}
      <div style={{padding:"18px 16px 80px"}}>{renderTab()}</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<LicenseGate><App/></LicenseGate>);
</script>
</body>
</html>
